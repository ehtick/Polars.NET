name: Build and Publish NuGet

# 触发机制：
# 1. 当推送到 main 分支时触发
# 2. 或者手动在 GitHub 界面点击 "Run workflow" 触发
on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'         # 忽略所有 .md 文件
      - 'LICENSE'       # 忽略 License
      - '.gitignore'    # 忽略 gitignore
      - 'docs/**'       # 忽略 docs 目录下的所有东西
      - 'icon.png'      # 忽略图标更新
  workflow_dispatch:

jobs:
  # ===================================================
  # 第一阶段：并行构建 Rust 原生库 (The Matrix Build)
  # ===================================================
  build-rust:
    name: Build Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: libnative_shim.so
          
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: native_shim.dll

          # MacOS ARM64 (Apple Silicon) - 目前 GitHub macos-latest 默认是 ARM64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: libnative_shim.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Remove Local Config (Linux)
        if: runner.os == 'Linux'
        run: rm -rf native_shim/.cargo

      # 安装 Rust 工具链
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: ./native_shim

      # 编译 Rust (Release 模式)
      # 这里的 native_shim 是你的 Rust 目录名，如果改了名字记得调整
      - name: Cargo Build
        working-directory: ./native_shim
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        working-directory: ./native_shim
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} .
          echo "✅ Moved artifact to root: ${{ matrix.artifact_name }}"

      # 上传构建产物 (暂存到 GitHub Actions)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.os }} #以此区分不同系统的包
          path: native_shim/${{ matrix.artifact_name }}
          if-no-files-found: error

  # ===================================================
  # 第二阶段：打包 .NET NuGet (The Packaging)
  # ===================================================
  package-dotnet:
    needs: build-rust # 必须等 Rust 编译完
    runs-on: ubuntu-latest
    name: Pack NuGet Packages
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 1. 准备目录结构 (对应 .csproj 里的路径)
      - name: Create Libs Directory
        run: |
          mkdir -p libs/linux-x64
          mkdir -p libs/win-x64
          mkdir -p libs/osx-arm64

      # 2. 下载并归位：Linux
      - name: Download Linux Lib
        uses: actions/download-artifact@v4
        with:
          name: native-lib-ubuntu-latest
          path: libs/linux-x64
          
      # 3. 下载并归位：Windows
      - name: Download Windows Lib
        uses: actions/download-artifact@v4
        with:
          name: native-lib-windows-latest
          path: libs/win-x64

      # 4. 下载并归位：MacOS
      - name: Download MacOS Lib
        uses: actions/download-artifact@v4
        with:
          name: native-lib-macos-latest
          path: libs/osx-arm64

      # 调试步骤：打印一下目录结构，确保文件都在
      - name: Inspect Directory Structure
        run: ls -R libs/

      # 5. 打包 Core (关键参数：BuildRustNative=false)
      - name: Pack Core
        run: dotnet pack Polars.NET.Core/Polars.NET.Core.csproj -c Release -p:BuildRustNative=false -o nupkgs

      # 6. 打包 C# API
      - name: Pack CSharp
        run: dotnet pack Polars.CSharp/Polars.CSharp.csproj -c Release -p:BuildRustNative=false -o nupkgs

      # 7. 打包 F# API
      - name: Pack FSharp
        run: dotnet pack Polars.FSharp/Polars.FSharp.fsproj -c Release -p:BuildRustNative=false -o nupkgs

      # 8. 上传最终的 .nupkg 文件供下载
      - name: Upload NuGet Packages
        uses: actions/upload-artifact@v4
        with:
          name: polars-net-nugets
          path: nupkgs
  # ===================================================
  # 第三阶段：全平台冒烟测试 (Smoke Test)
  # ===================================================
  smoke-test:
    needs: package-dotnet # 必须等包打完
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 1. 下载刚才打包阶段生成的 NuGet 包
      - uses: actions/download-artifact@v4
        with:
          name: polars-net-nugets
          path: local_feed

      # 2. 运行测试 (使用 Bash，在 Windows 上也能跑)
      - name: Run Smoke Test
        shell: bash
        run: |
          dotnet new console -n SmokeTest
          cd SmokeTest
          
          dotnet new nugetconfig
          dotnet nuget add source ../local_feed --name LocalFeed
          
          dotnet add package Polars.NET --version 0.1.0-alpha2
          
          cat <<EOF > Program.cs
          using System;
          using Polars.CSharp; 
          using static Polars.CSharp.Polars;

          class Program {
              static void Main() {
                  Console.WriteLine("🚀 Starting Polars.NET Smoke Test on $RUNNER_OS...");
                  try {
                      var df = DataFrame.FromColumns(new {
                          Id = new[] { 1, 2, 3, 4, 5 },
                          Name = new[] { "Alice", "Bob", "Charlie", "David", "Eve" },
                          Score = new double?[] { 85.5, 90.0, null, 88.5, 92.0 }
                      });
                      Console.WriteLine($"[Success] DataFrame Created: {df.Height} rows");

                      var filtered = df.Lazy()
                          .Filter(Col("Score") > 88.0)
                          .Collect();

                      Console.WriteLine($"[Success] Native Filter Executed. Result Rows: {filtered.Height}");
                      Console.WriteLine(filtered);
                      Console.WriteLine("✅ All Tests Passed!");
                  } catch (Exception ex) {
                      Console.Error.WriteLine("❌ Error: " + ex.ToString());
                      Environment.Exit(1);
                  }
              }
          }
          EOF
          
          dotnet run
