name: Build and Publish NuGet

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'        
      - 'LICENSE'      
      - '.gitignore'    
      - 'docs/**'     
      - 'icon.png'      
  workflow_dispatch:

jobs:
  # ===================================================
  # The Matrix Build
  # ===================================================
  build-rust:
    name: Build Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux x64 glibc ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
            artifact_name: libnative_shim.so
            use_cross: false
            rustflags: "-C target-cpu=x86-64-v3"

          # --- Linux x64 Musl ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            rid: linux-musl-x64
            artifact_name: libnative_shim.so
            use_cross: true 
            rustflags: "-C target-feature=-crt-static -C target-cpu=x86-64-v3"
            
          # --- Linux ARM64 glibc---
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
            artifact_name: libnative_shim.so
            use_cross: true
            
          # --- Linux ARM64 Musl ---
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            rid: linux-musl-arm64
            artifact_name: libnative_shim.so
            use_cross: true
            rustflags: "-C target-feature=-crt-static"
          
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
            artifact_name: native_shim.dll
            use_cross: false
            rustflags: "-C target-cpu=x86-64-v3"

          # MacOS ARM64 (Apple Silicon) - 
          - os: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
            artifact_name: libnative_shim.dylib
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Remove Local Config (Linux)
        if: runner.os == 'Linux'
        run: rm -rf native_shim/.cargo

      # Install Rust
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install Cross
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: ./native_shim
      
      - name: Set PERL environment variable (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: echo "PERL=C:/Strawberry/perl/bin/perl.exe" >> $env:GITHUB_ENV
      # Compile Rust (Release mode)
      - name: Build Native Shim
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          CARGO_CMD="cargo"
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            CARGO_CMD="cross"
          fi
          
          echo "Building for ${{ matrix.target }} using $CARGO_CMD..."
          echo "RUSTFLAGS: $RUSTFLAGS"

          cd native_shim
          $CARGO_CMD build --release --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        working-directory: ./native_shim
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} .
          echo "Moved artifact to root: ${{ matrix.artifact_name }}"

      # Upload Artifact to Git Actions
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.rid }}
          path: native_shim/${{ matrix.artifact_name }}
          if-no-files-found: error

  # ===================================================
  # Pack .NET NuGet (The Packaging)
  # ===================================================
  package-dotnet:
    needs: build-rust
    runs-on: ubuntu-latest
    name: Pack NuGet Packages
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create Libs Directory
        run: |
          mkdir -p libs/linux-x64
          mkdir -p libs/linux-musl-x64
          mkdir -p libs/linux-arm64
          mkdir -p libs/linux-musl-arm64
          mkdir -p libs/win-x64
          mkdir -p libs/osx-arm64

      # Linux x64
      - uses: actions/download-artifact@v4
        with:
          name: native-lib-linux-x64
          path: libs/linux-x64

      # Linux Musl x64
      - uses: actions/download-artifact@v4
        with:
          name: native-lib-linux-musl-x64
          path: libs/linux-musl-x64

      # Linux ARM64
      - uses: actions/download-artifact@v4
        with:
          name: native-lib-linux-arm64
          path: libs/linux-arm64

      # Linux Musl ARM64
      - uses: actions/download-artifact@v4
        with:
          name: native-lib-linux-musl-arm64
          path: libs/linux-musl-arm64

      # Windows x64
      - uses: actions/download-artifact@v4
        with:
          name: native-lib-win-x64
          path: libs/win-x64

      # MacOS ARM64
      - uses: actions/download-artifact@v4
        with:
          name: native-lib-osx-arm64
          path: libs/osx-arm64

      - name: Inspect Directory Structure
        run: ls -R libs/

      - name: Pack Core
        run: dotnet pack Polars.NET.Core/Polars.NET.Core.csproj -c Release -p:BuildRustNative=false -o nupkgs

      - name: Pack CSharp
        run: dotnet pack Polars.CSharp/Polars.CSharp.csproj -c Release -p:BuildRustNative=false -o nupkgs

      - name: Pack FSharp
        run: dotnet pack Polars.FSharp/Polars.FSharp.fsproj -c Release -p:BuildRustNative=false -o nupkgs

      - name: Upload NuGet Packages
        uses: actions/upload-artifact@v4
        with:
          name: polars-net-nugets
          path: nupkgs
  # ===================================================
  # Smoke Test
  # ===================================================
  smoke-test:
    needs: package-dotnet 
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/download-artifact@v4
        with:
          name: polars-net-nugets
          path: local_feed

      - name: Run Smoke Test
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' Polars.NET.Core/Polars.NET.Core.csproj | head -n 1 | tr -d '\r')
          
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version from csproj!"
            exit 1
          fi

          echo "🔍 Detected Version: '$VERSION'"

          dotnet new console -n SmokeTest
          cd SmokeTest
          
          dotnet new nugetconfig
          dotnet nuget add source ../local_feed --name LocalFeed
          
          dotnet add package Polars.NET --version "$VERSION"
          
          cat <<EOF > Program.cs
          using System;
          using Polars.CSharp; 
          using static Polars.CSharp.Polars;

          class Program {
              static void Main() {
                  Console.WriteLine("Starting Polars.NET Smoke Test...");
                  try {
                      var df = DataFrame.FromColumns(new {
                          Id = new[] { 1, 2, 3 },
                          Val = new[] { 10.0, 20.0, 30.0 }
                      });
                      Console.WriteLine($"[Success] DataFrame Created: {df.Height} rows");
                      Console.WriteLine(" Smoke Test Passed!");
                  } catch (Exception ex) {
                      Console.Error.WriteLine("Error: " + ex.ToString());
                      Environment.Exit(1);
                  }
              }
          }
          EOF
          
          dotnet run
