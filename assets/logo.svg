<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="netGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#512BD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d5eff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#0e0e0e" />
  
  <path d="M0 256 L512 256 M256 0 L256 512" stroke="#1e1e1e" stroke-width="2" />

  <g transform="translate(106, 106) scale(0.6)" filter="url(#glow)">
    <path d="M250 50 L450 150 L400 400 L250 500 L100 400 L50 150 Z" 
          fill="none" stroke="url(#netGradient)" stroke-width="20" stroke-linejoin="round"/>
    
    <path d="M180 300 L250 350 L320 300 L250 200 Z" 
          fill="#512BD4" opacity="0.8" />
    
    <line x1="150" y1="200" x2="180" y2="220" stroke="#00FFFF" stroke-width="15" stroke-linecap="round" />
    <line x1="350" y1="200" x2="320" y2="220" stroke="#00FFFF" stroke-width="15" stroke-linecap="round" />
    
    <path d="M250 50 L250 150" stroke="#9d5eff" stroke-width="10" />
    <path d="M50 150 L180 300" stroke="#333" stroke-width="5" />
    <path d="M450 150 L320 300" stroke="#333" stroke-width="5" />
  </g>

  <text x="256" y="460" font-family="Consolas, monospace" font-size="48" 
        fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">
    POLARS<tspan fill="#9d5eff">.NET</tspan>
  </text>
</svg>